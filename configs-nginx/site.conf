# burst – максимальный размер очереди (количество дополнительных запросов, которые могут быть обработаны сверх заданной скорости).
# Например, при rate=40r/m (примерно 0.67 запроса в секунду) и burst=5 система может принять до 5 запросов мгновенно, а остальные,
# превышающие лимит, будут помещаться в очередь и обрабатываться с задержкой, соответствующей средней скорости.

# nodelay – отключает искусственную задержку для запросов из очереди. 
# Если параметр указан, все запросы в пределах burst обрабатываются немедленно (без ожидания),
# но при этом лимит всё равно соблюдается за счёт того, что «ведро» опустошается.
# Если nodelay не указан, запросы из очереди будут выдаваться с задержкой, чтобы точно выдержать среднюю скорость.

# Расширенный формат лога с добавлением статуса лимитирования
log_format extended '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" "$http_x_forwarded_for" $request_id $limit_req_status';

server {
    listen 80;
    server_name _;
    server_tokens off;

    # Статика – лимиты не применяем, чтобы не мешать раздаче
    location /static/ {
        alias /var/www/static/;
        expires 1d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 1d;
        access_log off;
    }

    # API поиска фильмов (FastAPI)
    location /films-search/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://movies-films-search-service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # API пользовательского контента (закладки, оценки, рецензии)
    location /community-content/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://movies-community-content-service:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Админка Django
    location /admin/ {
        limit_req zone=admin_limit burst=50 nodelay;
        proxy_pass http://movies-admin-panel-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Корень сайта (тоже Django)
    location / {
        limit_req zone=admin_limit burst=50 nodelay;
        proxy_pass http://movies-admin-panel-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика Swagger UI (Flask-RESTX регистрирует blueprint /swaggerui/ на уровне приложения)
    location /swaggerui/ {
        proxy_pass http://movies-activity-tracker-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # UGC API (Flask) — сбор пользовательских событий
    location /ugc/ {
        limit_req zone=ugc_limit burst=30 nodelay;
        proxy_pass http://movies-activity-tracker-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    # Сервис авторизации
    location /auth/ {
        limit_req zone=auth_limit burst=50 nodelay;
        proxy_pass http://movies-auth-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /dev/stdout extended;
    error_log /dev/stderr warn;
}