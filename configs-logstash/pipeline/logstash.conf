input {
  beats {
    port => 5044
  }
}

filter {
  # Пробуем распарсить message как JSON (сервисы могут логировать в JSON)
  json {
    source => "message"
    target => "log_data"
    skip_on_invalid_json => true
  }

  # Добавляем поле с именем сервиса из метаданных Filebeat
  if [container][name] {
    mutate {
      add_field => { "service" => "%{[container][name]}" }
    }
  }

  # Парсим access-логи Nginx (формат extended) только для контейнера movies-nginx
  if [container][name] == "movies-nginx" {
    grok {
      match => {
        "message" => '%{IPORHOST:remote_addr} - %{DATA:remote_user} \[%{HTTPDATE:time_local}\] "%{WORD:request_method} %{DATA:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:body_bytes_sent} "%{DATA:http_referer}" "%{DATA:http_user_agent}" "%{DATA:http_x_forwarded_for}" %{DATA:request_id} %{DATA:limit_req_status}'
      }
      overwrite => [ "message" ]
    }

    # Устанавливаем @timestamp из поля time_local
    date {
      match => [ "time_local", "dd/MMM/yyyy:HH:mm:ss Z" ]
      remove_field => [ "time_local" ]
    }

    # Преобразуем числовые поля в числа
    mutate {
      convert => {
        "status"          => "integer"
        "body_bytes_sent" => "integer"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["movies-elasticsearch:9200"]
    index => "movies-logs-%{+YYYY.MM.dd}"
  }
}